name: devknow

services:
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file: .env
    volumes:
      - neo4j-data:/app/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEM:-1.5g}
          cpus: "2"

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_DATABASE: devknow
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --character-set-server=utf8mb4 --ngram_token_size=2
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: ${MYSQL_MEM:-512m}
          cpus: "1"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM:-128m}
          cpus: "0.5"

  rabbitmq:
    image: rabbitmq:3.13
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: ${RABBITMQ_MEM:-256m}
          cpus: "0.5"

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEM:-256m}
          cpus: "0.5"

  qdrant:
    image: qdrant/qdrant:v1.15.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: ${QDRANT_MEM:-512m}
          cpus: "1"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  prometheus:
    image: prom/prometheus:v2.53
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  grafana:
    image: grafana/grafana:11.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128m

  # SonarQube 不内嵌在 docker-compose 中（太重）。
  # 按需独立启动：docker compose -f docker-compose.sonar.yml up
          cpus: "0.25"

networks:
  backend-net:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  qdrant-data:
  neo4j-data:
  prometheus-data:
  grafana-data:
