# 一键拉起全部中间件：docker compose up -d
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: zhishu
    ports: ["3306:3306"]
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --ngram_token_size=2

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  rabbitmq:
    image: rabbitmq:3.13-management
    ports: ["5672:5672", "15672:15672"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio-data:/data

  milvus:
    image: milvusdb/milvus:v2.5.5
    command: milvus run standalone
    environment:
      ETCD_USE_EMBED: "true"
      GOGC: "200"                            # 降低 GC 频率，减少 CPU 开销
      GOMEMLIMIT: "2048"                     # Go 软内存限制（MiB）
      CACHE_SIZE: "1024"                     # Milvus 缓存大小（MB），默认 4096
      MQ_TYPE: "local"                       # 使用本地消息队列，不额外占用资源
    ports: ["19530:19530"]
    volumes:
      - milvus-data:/var/lib/milvus
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 1g

volumes:
  mysql-data:
  minio-data:
  milvus-data:
