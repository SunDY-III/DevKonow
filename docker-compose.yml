name: devknow

services:
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file: .env
    volumes:
      - neo4j-data:/app/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_DATABASE: devknow
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --character-set-server=utf8mb4 --ngram_token_size=2
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  rabbitmq:
    image: rabbitmq:3.13
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  qdrant:
    image: qdrant/qdrant:v1.15.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

networks:
  backend-net:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  qdrant-data:
  neo4j-data:
