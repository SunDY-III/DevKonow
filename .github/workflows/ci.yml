name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -B

      - name: Test with Coverage
        run: mvn verify -B
        env:
          # Testcontainers 在 CI 中使用 docker
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/index.html

      - name: SonarQube Scan
        if: github.ref == 'refs/heads/main'
        run: mvn sonar:sonar -B -DskipTests -Dsonar.host.url=${{ secrets.SONAR_HOST_URL || 'http://localhost:9000' }} -Dsonar.login=${{ secrets.SONAR_TOKEN || 'admin' }} -Dsonar.password=${{ secrets.SONAR_PASSWORD || 'admin' }}
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
