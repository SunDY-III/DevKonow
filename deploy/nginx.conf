events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr"'
    '}';

    access_log /var/log/nginx/access.log json;
    error_log /var/log/nginx/error.log warn;

    # 安全头默认值
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;  # 已废弃，保留兼容
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTPS Server（需要配置 SSL 证书后启用）
    # server {
    #     listen 443 ssl http2;
    #     server_name devknow.example.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/devknow.example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/devknow.example.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     location /api/ {
    #         proxy_pass http://backend:8080;
    #         proxy_http_version 1.1;
    #         proxy_set_header Connection "";
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #
    #         # SSE 必需：禁用缓冲
    #         proxy_buffering off;
    #         proxy_request_buffering off;
    #         proxy_cache off;
    #         gzip off;
    #         tcp_nodelay on;
    #         add_header X-Accel-Buffering "no" always;
    #         proxy_read_timeout 180s;
    #     }
    #
    #     location / {
    #         root /usr/share/nginx/html;
    #         index index.html;
    #         try_files $uri $uri/ /index.html;
    #     }
    # }

    # HTTP Server（开发/内网用）
    server {
        listen 80;
        server_name _;

        # API 代理（含 SSE 流式）
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE 必需配置：禁用所有缓冲
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            gzip off;
            tcp_nodelay on;
            add_header X-Accel-Buffering "no" always;

            # SSE 长连接超时
            proxy_read_timeout 180s;
        }

        # Actuator 健康检查端点
        location /actuator/ {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
        }

        # SPA 前端（Vue Router History 模式 fallback）
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
