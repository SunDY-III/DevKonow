# ==================== 开发环境配置 ====================
# 服务地址：localhost，密码轻量，调试日志开启
# 激活方式：SPRING_PROFILES_ACTIVE=dev 或 --spring.profiles.active=dev

server:
  tomcat:
    connection-timeout: 60s

spring:
  servlet:
    multipart:
      file-size-threshold: 0B    # 直接写磁盘，避免小文件也占堆内存
      resolve-lazily: true       # 延迟解析，上传超大文件时不阻塞
  datasource:
    url: jdbc:mysql://localhost:3306/devknow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: ${RABBITMQ_PASSWORD:guest}

minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: zhishu-docs

# 开发环境：启用 LLM 请求日志便于调试
llm:
  log-requests: ${LLM_LOG_REQUESTS:true}
  log-responses: ${LLM_LOG_RESPONSES:true}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
