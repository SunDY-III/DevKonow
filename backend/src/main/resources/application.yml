server:
  port: 8080
  tomcat:
    connection-timeout: 60s
  shutdown: graceful

spring:
  application:
    name: zhishu-ai-agent
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}  # 默认 dev，生产通过环境变量覆盖
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# LLM 模型（OpenAI 协议兼容，所有值通过环境变量覆盖）
llm:
  base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
  api-key: ${LLM_API_KEY:}
  chat-model: ${LLM_CHAT_MODEL:gpt-4o-mini}
  embedding-base-url: ${EMBEDDING_BASE_URL:${LLM_BASE_URL:https://api.openai.com/v1}}
  embedding-api-key: ${EMBEDDING_API_KEY:${LLM_API_KEY:}}
  embedding-model: ${EMBEDDING_MODEL:text-embedding-3-small}
  embedding-dimensions: ${EMBEDDING_DIMENSIONS:0}
  organization-id: ${LLM_ORG_ID:}
  custom-headers: ${LLM_CUSTOM_HEADERS:}
  max-retries: ${LLM_MAX_RETRIES:2}
  log-requests: ${LLM_LOG_REQUESTS:false}
  log-responses: ${LLM_LOG_RESPONSES:false}
  chat-temperature: ${LLM_CHAT_TEMPERATURE:0.2}
  stream-temperature: ${LLM_STREAM_TEMPERATURE:0.3}
  chat-timeout-seconds: ${LLM_CHAT_TIMEOUT:60}
  stream-timeout-seconds: ${LLM_STREAM_TIMEOUT:120}
  embedding-timeout-seconds: ${LLM_EMBEDDING_TIMEOUT:30}
  max-concurrency: 8

# Actuator 端点暴露（dev 环境放开更多，prod 仅 health/metrics）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

# 应用业务配置
app:
  jwt:
    secret: ${JWT_SECRET:zhishu-demo-secret-please-change-this-to-a-long-random-string!}
    expire-hours: ${JWT_EXPIRE_HOURS:72}
  rag:
    chunk-size: 500
    chunk-overlap: 80
    vector-top-k: 8
    keyword-top-k: 8
    rerank-top-n: 4
    rrf-k: 60
    confidence-threshold: 0.45
    strategies:
      learn:
        chunk-size: 1024
        chunk-overlap: 128
        skip-checkpoints: "1,2"
        hyde-enabled: false
        mmr-enabled: false
      interview:
        chunk-size: 2048
        chunk-overlap: 320
        skip-checkpoints: ""
        hyde-enabled: true
        mmr-enabled: true
      safety:
        chunk-size: 256
        chunk-overlap: 64
        skip-checkpoints: ""
        hyde-enabled: true
        mmr-enabled: true
      code:
        chunk-size: 384
        chunk-overlap: 0
        skip-checkpoints: ""
        hyde-enabled: true
        mmr-enabled: false
      doc:
        chunk-size: 500
        chunk-overlap: 80
        skip-checkpoints: ""
        hyde-enabled: true
        mmr-enabled: true
      default:
        chunk-size: 500
        chunk-overlap: 80
        skip-checkpoints: ""
        hyde-enabled: true
        mmr-enabled: true
  semantic-cache:
    threshold: 0.95
    ttl-hours: 24
  memory:
    window-size: 10
    summary-trigger: 30
  rate-limit:
    user-capacity: 20
    api-capacity: 200
    window-seconds: 60
  token-budget:
    daily-per-user: ${TOKEN_BUDGET_DAILY_USER:0}  # 单用户每日 Token 预算上限（0 不限制）
  agent:
    max-tool-rounds: 6
  project:
    max-repo-mb: 2000
    max-repo-files: 50000
  codeindex:
    mode: tree-sitter
    scip:
      enabled: false
      index-file: index.scip

resilience4j:
  circuitbreaker:
    instances:
      llm:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2

qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}
  collection: ${QDRANT_COLLECTION:devknow_vectors}
  dimension: ${QDRANT_DIMENSION:1536}
