server:
  port: 8080
  # SSE 长连接：异步请求超时设大一点，避免流式输出中途被容器切断
  tomcat:
    connection-timeout: 60s

spring:
  application:
    name: zhishu-ai-agent
  datasource:
    url: jdbc:mysql://localhost:3306/devknow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none            # 表结构以 sql/schema.sql 为准，避免 JPA 自动建表丢失全文索引
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual   # 手动 ack：解析失败可重回队列
        prefetch: 1
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: zhishu-docs

llm:
  # 默认对接「第三方 GPT 中转」（OpenAI 协议兼容）。换任意兼容服务只改 base-url / model / key。
  #   · 第三方 GPT 中转 / OpenAI 官方：必须配置真实 key（export LLM_API_KEY=sk-xxx）
  #   · 本地 one-api / Ollama 等不校验 key 的网关：key 可留空
  #
  # base-url 填中转站给出的 OpenAI 兼容地址，务必带 /v1 后缀，例如：
  #   export LLM_BASE_URL=https://your-gpt-proxy.com/v1
  base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
  api-key: ${LLM_API_KEY:}
  # GPT 对话模型：gpt-4o-mini（性价比）/ gpt-4o / gpt-3.5-turbo 等
  chat-model: ${LLM_CHAT_MODEL:gpt-4o-mini}

  # Embedding 可与对话用同一中转；GPT 系列用 text-embedding-3-small / -large。
  # 默认复用对话的 base-url / key（同一中转站），需要时再单独覆盖。
  embedding-base-url: ${EMBEDDING_BASE_URL:${LLM_BASE_URL:https://api.openai.com/v1}}
  embedding-api-key: ${EMBEDDING_API_KEY:${LLM_API_KEY:}}
  embedding-model: ${EMBEDDING_MODEL:text-embedding-3-small}
  # text-embedding-3-* 支持自定义维度；留 0 用模型默认（small=1536）。
  # 注意：换 embedding 模型/维度后，旧向量需重新入库（维度不同无法比对）。
  embedding-dimensions: ${EMBEDDING_DIMENSIONS:0}

  # 以下为第三方中转常用可选项，不需要就保持默认 —————————————————————
  organization-id: ${LLM_ORG_ID:}            # OpenAI organization（个别中转/官方多组织需要）
  custom-headers: ${LLM_CUSTOM_HEADERS:}     # 额外请求头，格式 K1:V1;K2:V2（个别中转需渠道头）
  max-retries: ${LLM_MAX_RETRIES:2}          # 单次调用失败自动重试次数（应对中转偶发抖动）
  log-requests: ${LLM_LOG_REQUESTS:false}    # 调试：打印请求体到日志（排查中转连通性）
  log-responses: ${LLM_LOG_RESPONSES:false}  # 调试：打印响应体到日志
  chat-temperature: ${LLM_CHAT_TEMPERATURE:0.2}
  stream-temperature: ${LLM_STREAM_TEMPERATURE:0.3}
  chat-timeout-seconds: ${LLM_CHAT_TIMEOUT:60}
  stream-timeout-seconds: ${LLM_STREAM_TIMEOUT:120}
  embedding-timeout-seconds: ${LLM_EMBEDDING_TIMEOUT:30}

  max-concurrency: 8          # LLM 调用层信号量并发上限，防止打爆 API 配额

app:
  jwt:
    secret: zhishu-demo-secret-please-change-this-to-a-long-random-string!
    expire-hours: 72
  rag:
    chunk-size: 500           # 切分目标长度（字符）
    chunk-overlap: 80         # 滑动窗口重叠，防止关键句被切断在边界
    vector-top-k: 8           # 向量召回数
    keyword-top-k: 8          # 关键词召回数
    rerank-top-n: 4           # 重排后进入 Prompt 的片段数
    rrf-k: 60                 # RRF 平滑常数
    confidence-threshold: 0.45  # 检索置信度低于该值 -> 转工单 Agent
  semantic-cache:
    threshold: 0.95           # 语义缓存命中阈值（偏保守，降低误命中）
    ttl-hours: 24
  memory:
    window-size: 10           # 保留最近 N 轮
    summary-trigger: 30       # 消息数超过该值触发历史摘要压缩（须大于 window-size*2 + 2，防止压缩后立即再触发）
  rate-limit:
    user-capacity: 20         # 用户级：每窗口最大请求数
    api-capacity: 200         # 接口级
    window-seconds: 60
  agent:
    max-tool-rounds: 6        # Agent 最大推理轮次，防死循环烧 Token
  project:
    max-repo-mb: 2000         # 最大仓库大小（MB），超过阻止导入
    max-repo-files: 50000     # 最大文件数，超过阻止导入
  codeindex:
    mode: tree-sitter         # tree-sitter（轻量级）| scip（性能级，需 index.scip）
    scip:
      enabled: false          # SCIP 模式开关（mode=scip 时自动启用）
      index-file: index.scip  # SCIP 索引文件名

resilience4j:
  circuitbreaker:
    instances:
      llm:
        sliding-window-size: 10            # 统计最近 10 次调用
        failure-rate-threshold: 50         # 失败率 >= 50% 熔断打开
        wait-duration-in-open-state: 30s   # 打开 30s 后进入半开试探
        permitted-number-of-calls-in-half-open-state: 2

# Qdrant 向量数据库配置（轻量级 Rust 实现，替代 Milvus）
qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}
  collection: ${QDRANT_COLLECTION:devknow_vectors}
  dimension: ${QDRANT_DIMENSION:1536}      # text-embedding-3-small 默认为 1536
