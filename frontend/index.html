<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智枢 · 知识库问答与工单 Agent 控制台</title>
<style>
  /* ───────────────────────────────────────────────────────────
     视觉基调：参考 Claude 官网的暖奶油色系。
       底色 Pampas #F4F3EE，招牌珊瑚 Crail #C15F3C，暖近黑文字，
       衬线字承载品牌字标，等宽字承载工单号/片段编号。
     签名元素保留：回答下方的「引用索引卡」—— 珊瑚色档案卡，挂出处。
     交互强调「平滑」：入场淡入上移、流式光标、悬浮微抬升、缓动滚动。
     新增：启动闪屏 / 登录页 / 控制台 三段式 + 视图切换加载过渡页。
     ─────────────────────────────────────────────────────────── */
  :root {
    --cream:      #f4f3ee;   /* Pampas，应用底色 */
    --cream-2:    #faf9f5;   /* 抬起表面 */
    --paper:      #ffffff;
    --ink:        #1f1e1c;   /* 暖近黑正文 */
    --ink-soft:   #56524a;   /* 次级文字 */
    --muted:      #908979;   /* Cloudy 暖灰 */
    --accent:     #c15f3c;   /* Crail，Claude 珊瑚 */
    --accent-hi:  #a94d2d;   /* 按下/悬浮加深 */
    --accent-soft:#f1e3da;   /* 珊瑚浅填充 */
    --tan:        #d4a27f;
    --line:       #e8e3d8;   /* 暖色发丝线 */
    --user-bubble:#ece6db;   /* 用户气泡：暖米 */
    --warn:       #9a5b1f;
    --danger:     #b23b2e;
    --shadow-sm:  0 1px 2px rgba(50,38,24,.05);
    --shadow-md:  0 1px 2px rgba(50,38,24,.04), 0 10px 28px rgba(50,38,24,.07);
    --shadow-lg:  0 2px 6px rgba(50,38,24,.06), 0 24px 60px rgba(50,38,24,.12);
    --serif: ui-serif, "Songti SC", Georgia, "Times New Roman", serif;
    --sans: "PingFang SC", "Microsoft YaHei", -apple-system, "Segoe UI", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  * { box-sizing: border-box; margin: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--ink);
    height: 100vh; overflow: hidden;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }

  input, button { font: inherit; }
  input {
    padding: 8px 12px; border: 1px solid var(--line); border-radius: 9px;
    background: var(--paper); color: var(--ink);
    transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
  }
  input::placeholder { color: var(--muted); }
  input:focus { outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft); }
  button {
    padding: 8px 16px; border: none; border-radius: 9px;
    background: var(--accent); color: #fff; cursor: pointer; font-weight: 500;
    transition: transform .16s var(--ease), background .16s var(--ease), box-shadow .16s var(--ease);
  }
  button:hover:not(:disabled) { background: var(--accent-hi);
    transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: .55; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--accent);
    border: 1px solid var(--line); }
  button.ghost:hover:not(:disabled) { background: var(--accent-soft);
    border-color: var(--accent-soft); }

  /* ── 通用旋转加载环 ── */
  .spinner { display: inline-block; width: 15px; height: 15px;
    border: 2px solid currentColor; border-right-color: transparent;
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: -3px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══════════ 启动闪屏 ═══════════ */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(120% 120% at 50% 35%, var(--cream-2) 0%, var(--cream) 60%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 26px;
    transition: opacity .55s var(--ease), visibility .55s var(--ease);
  }
  #splash.hide { opacity: 0; visibility: hidden; }
  /* 品牌字标 + 环绕珊瑚轨道 */
  .splash-mark { position: relative; width: 96px; height: 96px;
    display: flex; align-items: center; justify-content: center; }
  .splash-mark .glyph { font-family: var(--serif); font-size: 38px; font-weight: 600;
    letter-spacing: 2px; color: var(--ink);
    animation: glyphIn .8s var(--ease) both; }
  .splash-mark .orbit { position: absolute; inset: 0;
    animation: spin 2.4s linear infinite; }
  .splash-mark .orbit::before { content: ""; position: absolute;
    top: -3px; left: 50%; width: 9px; height: 9px; margin-left: -4.5px;
    border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 5px var(--accent-soft); }
  .splash-mark .ring { position: absolute; inset: 6px; border-radius: 50%;
    border: 1px dashed var(--line); }
  .splash-title { font-family: var(--serif); font-size: 22px; letter-spacing: 6px;
    color: var(--ink); animation: msgIn .7s .15s var(--ease) both; }
  .splash-sub { font-size: 12px; color: var(--muted); letter-spacing: 1px;
    animation: msgIn .7s .28s var(--ease) both; }
  .splash-bar { width: 180px; height: 3px; border-radius: 99px;
    background: var(--line); overflow: hidden; margin-top: 4px;
    animation: msgIn .7s .4s var(--ease) both; }
  .splash-bar i { display: block; height: 100%; width: 40%; border-radius: 99px;
    background: linear-gradient(90deg, var(--tan), var(--accent));
    animation: load 1.1s var(--ease) infinite; }
  @keyframes glyphIn { from { opacity: 0; transform: scale(.8); } to { opacity: 1; transform: scale(1); } }
  @keyframes load { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }

  /* ═══════════ 视图切换加载过渡页 ═══════════ */
  #viewLoader {
    position: fixed; inset: 0; z-index: 80;
    background: rgba(244,243,238,.92);
    backdrop-filter: blur(4px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; opacity: 0; visibility: hidden;
    transition: opacity .35s var(--ease), visibility .35s var(--ease);
  }
  #viewLoader.show { opacity: 1; visibility: visible; }
  #viewLoader .ring-lg { width: 34px; height: 34px; border: 3px solid var(--accent-soft);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  #viewLoader .txt { font-size: 13px; color: var(--ink-soft); letter-spacing: 1px; }

  /* ═══════════ 视图容器 ═══════════ */
  #app { height: 100vh; display: flex; flex-direction: column; }
  .view { display: none; flex: 1; min-height: 0; }
  .view.active { animation: viewIn .5s var(--ease) both; }
  #loginView.active  { display: flex; }
  #consoleView.active { display: grid; }
  @keyframes viewIn { from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); } }

  /* ── 顶栏 ── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 26px;
    background: rgba(250,249,245,.82);
    backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  .brand { display: flex; align-items: baseline; gap: 11px; }
  .brand .spark { width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent); align-self: center;
    box-shadow: 0 0 0 4px var(--accent-soft); }
  .brand h1 { font-family: var(--serif); font-size: 21px; font-weight: 600;
    letter-spacing: 4px; color: var(--ink); }
  .brand .sub { font-size: 12px; color: var(--muted); letter-spacing: .3px; }
  .auth { margin-left: auto; display: none; gap: 12px; align-items: center; }
  .auth.show { display: flex; }
  .who { font-size: 12.5px; color: var(--ink-soft); }
  .who b { color: var(--accent); font-weight: 600; }

  /* ═══════════ 登录页 ═══════════ */
  #loginView { align-items: center; justify-content: center; padding: 24px;
    background:
      radial-gradient(60% 50% at 18% 12%, #fbeee5 0%, rgba(251,238,229,0) 55%),
      radial-gradient(50% 45% at 88% 90%, #f3ece0 0%, rgba(243,236,224,0) 60%),
      var(--cream); }
  .login-card {
    width: 100%; max-width: 372px; background: var(--paper);
    border: 1px solid var(--line); border-radius: 20px;
    box-shadow: var(--shadow-lg); padding: 38px 34px 30px;
    animation: cardIn .55s var(--ease) both;
  }
  .login-card .mark { font-family: var(--serif); font-size: 30px; letter-spacing: 7px;
    color: var(--ink); text-align: center; }
  .login-card .mark .dot { color: var(--accent); }
  .login-card .tag { text-align: center; font-size: 12px; color: var(--muted);
    letter-spacing: .6px; margin-top: 9px; margin-bottom: 26px; }
  .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 15px; }
  .field label { font-size: 12px; color: var(--ink-soft); letter-spacing: .4px; }
  .field input { padding: 11px 13px; border-radius: 11px; }
  .login-card .primary { width: 100%; height: 46px; border-radius: 12px; margin-top: 8px;
    font-weight: 600; letter-spacing: 2px; display: inline-flex;
    align-items: center; justify-content: center; gap: 9px; }
  .login-hint { text-align: center; font-size: 11.5px; color: var(--muted);
    margin-top: 16px; line-height: 1.7; }
  .login-msg { min-height: 18px; text-align: center; font-size: 12.5px;
    margin-top: 14px; transition: color .2s var(--ease); }
  .login-msg.err { color: var(--danger); }
  .login-msg.ok  { color: var(--accent); }

  /* ── 主区（控制台） ── */
  #consoleView { grid-template-columns: 296px 1fr; }

  aside {
    border-right: 1px solid var(--line);
    background: var(--cream-2);
    padding: 20px; overflow-y: auto;
  }
  aside h2 { font-family: var(--serif); font-size: 14px; color: var(--ink);
    letter-spacing: 1px; margin-bottom: 4px; }
  aside .hint { font-size: 11.5px; color: var(--muted); margin-bottom: 14px; }
  .uploader { display: flex; flex-direction: column; gap: 9px; margin-bottom: 18px; }
  .uploader input[type=file] { font-size: 12px; padding: 7px; cursor: pointer; }
  .uploader input[type=file]::file-selector-button {
    font: inherit; margin-right: 9px; padding: 5px 11px; border: none;
    border-radius: 7px; background: var(--accent-soft); color: var(--accent);
    cursor: pointer; transition: background .16s var(--ease); }
  .uploader input[type=file]::file-selector-button:hover { background: #ecd9cd; }
  .uploader .ghost { display: inline-flex; align-items: center; justify-content: center; gap: 8px; }

  .doc {
    font-size: 12.5px; padding: 11px 12px; border: 1px solid var(--line);
    border-radius: 11px; margin-bottom: 9px; background: var(--paper);
    transition: transform .18s var(--ease), box-shadow .18s var(--ease), border-color .18s var(--ease);
    animation: cardIn .42s var(--ease) both;
  }
  .doc:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm);
    border-color: #ddd6c8; }
  .doc .name { color: var(--ink); font-weight: 500; word-break: break-all; line-height: 1.5; }
  .doc .st { display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; }
  .doc .st .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .doc .st.ready .dot { background: var(--accent); }
  .doc .st.parsing .dot { background: var(--tan); animation: pulse 1.1s ease-in-out infinite; }
  .doc .empty { font-size: 12px; color: var(--muted); padding: 18px 4px; line-height: 1.7; }

  /* 文档列表骨架屏 */
  .skel { height: 56px; border-radius: 11px; margin-bottom: 9px;
    background: linear-gradient(100deg, var(--cream) 30%, #efe9dd 50%, var(--cream) 70%);
    background-size: 220% 100%; animation: shimmer 1.2s var(--ease) infinite; }
  @keyframes shimmer { from { background-position: 180% 0; } to { background-position: -40% 0; } }

  /* ── 对话区 ── */
  #chat { display: flex; flex-direction: column; min-height: 0; }
  #msgs { flex: 1; overflow-y: auto; padding: 30px 28px 18px;
    display: flex; flex-direction: column; gap: 18px;
    scroll-behavior: smooth; }
  #msgs::-webkit-scrollbar { width: 10px; }
  #msgs::-webkit-scrollbar-thumb { background: #e0dacd; border-radius: 10px;
    border: 3px solid var(--cream); }
  #msgs::-webkit-scrollbar-thumb:hover { background: var(--tan); }

  .welcome { margin: auto; text-align: center; color: var(--muted); max-width: 440px; }
  .welcome .mark { font-family: var(--serif); font-size: 30px; color: var(--ink);
    letter-spacing: 6px; margin-bottom: 12px; }
  .welcome p { font-size: 13.5px; line-height: 1.85; }

  .row { display: flex; animation: msgIn .44s var(--ease) both; }
  .row.me { justify-content: flex-end; }
  .row.ai { justify-content: flex-start; }
  .msg { max-width: 74%; padding: 13px 17px; line-height: 1.78; font-size: 14px;
    white-space: pre-wrap; word-break: break-word; }
  .me .msg { background: var(--user-bubble); color: var(--ink);
    border-radius: 16px 16px 5px 16px; }
  .ai .msg { background: var(--paper); border: 1px solid var(--line);
    border-radius: 16px 16px 16px 5px; box-shadow: var(--shadow-sm); }

  .badge { display: inline-block; font-size: 11px; font-family: var(--mono);
    padding: 3px 9px; border-radius: 999px; margin-bottom: 9px; font-weight: 500;
    animation: msgIn .3s var(--ease) both; }
  .badge.cache  { background: var(--accent-soft); color: var(--accent); }
  .badge.ticket { background: #f5ead9; color: var(--warn); }

  /* 流式光标 */
  .caret { display: inline-block; width: 7px; height: 1.05em; margin-left: 2px;
    vertical-align: -2px; background: var(--accent); border-radius: 1px;
    animation: blink 1s step-end infinite; }

  /* 思考中三点 */
  .typing { display: inline-flex; gap: 5px; padding: 3px 0; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--tan);
    animation: bounce 1.3s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: .18s; }
  .typing span:nth-child(3) { animation-delay: .36s; }

  /* 签名元素：引用索引卡 */
  .sources { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
    padding-top: 11px; border-top: 1px dashed var(--line); }
  .src-card { font-family: var(--mono); font-size: 11px; color: var(--accent);
    background: var(--accent-soft); border-left: 3px solid var(--accent);
    padding: 5px 10px; border-radius: 0 8px 8px 0;
    animation: cardIn .4s var(--ease) both;
    transition: transform .16s var(--ease); }
  .src-card:hover { transform: translateX(2px); }

  /* ── 输入条 ── */
  #inputBar { display: flex; gap: 10px; padding: 16px 28px 20px;
    background: linear-gradient(to top, var(--cream) 55%, rgba(244,243,238,0));
    align-items: flex-end; }
  #question { flex: 1; resize: none; min-height: 46px; max-height: 150px;
    border-radius: 14px; padding: 12px 16px; line-height: 1.6;
    box-shadow: var(--shadow-sm); }
  #askBtn { height: 46px; padding: 0 22px; border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; }

  @keyframes msgIn { from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); } }
  @keyframes cardIn { from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity:.5; }
    40% { transform: translateY(-5px); opacity:1; } }

  @media (max-width: 760px) {
    #consoleView { grid-template-columns: 1fr; }
    aside { display: none; }
    .msg { max-width: 86%; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, ::before, ::after { animation: none !important;
      transition-duration: .01ms !important; scroll-behavior: auto !important; }
  }
</style>
</head>
<body>

<!-- ═══ 启动闪屏 ═══ -->
<div id="splash">
  <div class="splash-mark">
    <span class="ring"></span>
    <span class="orbit"></span>
    <span class="glyph">智</span>
  </div>
  <div class="splash-title">智枢</div>
  <div class="splash-sub">企业知识库问答 · 智能工单 Agent</div>
  <div class="splash-bar"><i></i></div>
</div>

<!-- ═══ 视图切换加载过渡页 ═══ -->
<div id="viewLoader">
  <div class="ring-lg"></div>
  <div class="txt" id="viewLoaderTxt">正在进入控制台…</div>
</div>

<!-- ═══ 应用主体 ═══ -->
<div id="app">
  <header>
    <div class="brand">
      <span class="spark"></span>
      <h1>智枢</h1>
      <span class="sub">企业知识库问答 · 智能工单 Agent</span>
    </div>
    <div class="auth" id="headerAuth">
      <span class="who" id="who"></span>
      <button class="ghost" onclick="logout()">退出登录</button>
    </div>
  </header>

  <!-- 登录视图 -->
  <section id="loginView" class="view active">
    <div class="login-card">
      <div class="mark">智枢<span class="dot">.</span></div>
      <div class="tag">登录以构建私有知识库并开始问答</div>

      <div class="field">
        <label for="u">用户名</label>
        <input id="u" placeholder="输入用户名" value="demo"
          onkeydown="if(event.key==='Enter')auth()">
      </div>
      <div class="field">
        <label for="p">密码</label>
        <input id="p" type="password" placeholder="输入密码" value="123456"
          onkeydown="if(event.key==='Enter')auth()">
      </div>

      <button class="primary" id="loginBtn" onclick="auth()">登录 / 注册</button>
      <div class="login-msg" id="loginMsg"></div>
      <div class="login-hint">账号不存在时将自动注册并登录。<br>
        默认 demo / 123456，可直接体验。</div>
    </div>
  </section>

  <!-- 控制台视图 -->
  <main id="consoleView" class="view">
    <aside>
      <h2>知识库文档</h2>
      <div class="hint">上传后自动解析、切分、向量化</div>
      <div class="uploader">
        <input type="file" id="file">
        <button class="ghost" id="uploadBtn" onclick="upload()">上传并解析</button>
      </div>
      <div id="docs"></div>
    </aside>

    <section id="chat">
      <div id="msgs">
        <div class="welcome" id="welcome">
          <div class="mark">智枢</div>
          <p>上传企业文档构建私有知识库。<br>
             提问将基于检索结果作答并标注来源；<br>
             知识库无法解答时，自动转交工单 Agent 处理。</p>
        </div>
      </div>
      <div id="inputBar">
        <textarea id="question" rows="1" placeholder="向知识库提问，无法解答会自动转工单…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ask()}"
          oninput="autosize(this)"></textarea>
        <button id="askBtn" onclick="ask()">发送</button>
      </div>
    </section>
  </main>
</div>

<script>
const API = 'http://localhost:8080';   // 后端地址，按部署环境调整
let token = '';
const convId = 'web-' + Date.now();

/* ── 启动闪屏：页面就绪后保证最短展示时长再淡出 ── */
(function bootSplash(){
  const splash = document.getElementById('splash');
  const start = Date.now();
  const MIN = 1000;   // 最短展示，避免一闪而过
  window.addEventListener('load', () => {
    const wait = Math.max(0, MIN - (Date.now() - start));
    setTimeout(() => { splash.classList.add('hide'); document.getElementById('u').focus(); }, wait);
  });
})();

/* ── 视图切换 + 全屏加载过渡页 ── */
function showViewLoader(text){
  document.getElementById('viewLoaderTxt').textContent = text || '加载中…';
  document.getElementById('viewLoader').classList.add('show');
}
function hideViewLoader(){ document.getElementById('viewLoader').classList.remove('show'); }

function switchView(name){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(name + 'View').classList.add('active');
}

/* 登录成功 → 过渡到控制台 */
function gotoConsole(username){
  showViewLoader('正在进入控制台…');
  setTimeout(() => {
    switchView('console');
    document.getElementById('headerAuth').classList.add('show');
    document.getElementById('who').innerHTML = '已登录 <b>' + escapeHtml(username) + '</b>';
    loadDocs();
    addMsg('ai', '已登录。上传文档构建知识库，然后开始提问。');
    setTimeout(hideViewLoader, 480);
  }, 680);
}

/* 退出登录 → 过渡回登录页 */
function logout(){
  showViewLoader('正在退出…');
  setTimeout(() => {
    token = '';
    document.getElementById('headerAuth').classList.remove('show');
    document.getElementById('msgs').innerHTML =
      '<div class="welcome" id="welcome"><div class="mark">智枢</div>' +
      '<p>上传企业文档构建私有知识库。<br>提问将基于检索结果作答并标注来源；<br>' +
      '知识库无法解答时，自动转交工单 Agent 处理。</p></div>';
    setLoginMsg('', '');
    switchView('login');
    setTimeout(() => { hideViewLoader(); document.getElementById('u').focus(); }, 480);
  }, 500);
}

function autosize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,150)+'px'; }
function clearWelcome(){ const w=document.getElementById('welcome'); if(w) w.remove(); }

function setLoginMsg(text, kind){
  const m = document.getElementById('loginMsg');
  m.textContent = text || '';
  m.className = 'login-msg' + (kind ? ' ' + kind : '');
}
function setLoginLoading(on, text){
  const btn = document.getElementById('loginBtn');
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span>' + (text || '处理中…') : '登录 / 注册';
}

/* ── 登录 / 注册（带加载态与异常兜底） ── */
async function auth() {
  const username = document.getElementById('u').value.trim();
  const password = document.getElementById('p').value;
  if (!username || !password) { setLoginMsg('请输入用户名与密码', 'err'); return; }

  setLoginLoading(true, '登录中…');
  setLoginMsg('', '');
  const body = JSON.stringify({ username, password });
  try {
    let r = await fetch(API + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
    let j = await r.json();
    if (j.code !== 0) {
      // 账号不存在 → 自动注册
      setLoginLoading(true, '注册中…');
      r = await fetch(API + '/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
      j = await r.json();
    }
    if (j.code === 0) {
      token = j.data.token;
      setLoginMsg('登录成功', 'ok');
      gotoConsole(username);
    } else {
      setLoginMsg(j.message || '登录失败，请检查账号密码', 'err');
    }
  } catch (e) {
    setLoginMsg('无法连接服务，请确认后端已启动（' + API + '）', 'err');
  } finally {
    setLoginLoading(false);
  }
}

/* ── 文档上传（带加载态与异常兜底） ── */
async function upload() {
  const file = document.getElementById('file');
  if (!file.files[0]) return alert('请先选择文件');
  if (!token) return alert('请先登录');

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>上传中…';
  try {
    const fd = new FormData(); fd.append('file', file.files[0]);
    const r = await fetch(API + '/api/doc/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd });
    const j = await r.json();
    if (j.code === 0) {
      file.value = '';
      pollProgress(j.data.id);
    } else {
      alert(j.message || '上传失败');
    }
    loadDocs();
  } catch (e) {
    alert('上传失败，请稍后重试');
  } finally {
    btn.disabled = false;
    btn.textContent = '上传并解析';
  }
}

async function pollProgress(id) {
  try {
    const r = await fetch(API + `/api/doc/${id}/progress`, { headers: { Authorization: 'Bearer ' + token } });
    const j = await r.json();
    loadDocs();
    if (j.data && j.data.status === 'PARSING') setTimeout(() => pollProgress(id), 1500);
  } catch (e) { /* 轮询失败静默，下次上传/刷新自愈 */ }
}

/* ── 文档列表（带骨架屏） ── */
let docsLoaded = false;
async function loadDocs() {
  const docs = document.getElementById('docs');
  if (!docsLoaded) docs.innerHTML = '<div class="skel"></div><div class="skel"></div><div class="skel"></div>';
  try {
    const r = await fetch(API + '/api/doc/list', { headers: { Authorization: 'Bearer ' + token } });
    const j = await r.json();
    docsLoaded = true;
    const list = j.data || [];
    if (!list.length) { docs.innerHTML = '<div class="empty">还没有文档。上传后即可基于其内容问答。</div>'; return; }
    docs.innerHTML = list.map(d => {
      const ready = d.status !== 'PARSING';
      return `<div class="doc">
        <div class="name">${escapeHtml(d.fileName)}</div>
        <span class="st ${ready?'ready':'parsing'}"><span class="dot"></span>${d.status} · ${d.chunkCount} chunks</span>
      </div>`;
    }).join('');
  } catch (e) {
    docs.innerHTML = '<div class="empty">文档列表加载失败，请稍后重试。</div>';
  }
}

function addMsg(cls, text) {
  clearWelcome();
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'row ' + cls;
  const div = document.createElement('div');
  div.className = 'msg';
  div.textContent = text;
  row.appendChild(div);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

/* SSE：用 fetch ReadableStream 手动解析 event/data 帧（复用同一连接展示多种自定义事件） */
async function ask() {
  const question = document.getElementById('question');
  const askBtn = document.getElementById('askBtn');
  const msgs = document.getElementById('msgs');
  const q = question.value.trim();
  if (!q) return;
  if (!token) { alert('请先登录'); return; }

  question.value = ''; autosize(question);
  askBtn.disabled = true; askBtn.innerHTML = '<span class="spinner"></span>';
  addMsg('me', q);
  const aiDiv = addMsg('ai', '');
  aiDiv.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
  let body = '', srcHtml = '', badge = '', started = false;

  const render = (streaming) => {
    const caret = streaming ? '<span class="caret"></span>' : '';
    aiDiv.innerHTML = badge + escapeHtml(body) + caret + srcHtml;
    msgs.scrollTop = msgs.scrollHeight;
  };

  try {
    const url = `${API}/api/chat/stream?conversationId=${convId}&question=${encodeURIComponent(q)}&token=${token}`;
    const resp = await fetch(url);
    if (!resp.ok || !resp.body) throw new Error('bad response ' + resp.status);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {
        const frame = buf.slice(0, idx); buf = buf.slice(idx + 2);
        let event = 'message', data = '';
        for (const line of frame.split('\n')) {
          if (line.startsWith('event:')) event = line.slice(6).trim();
          if (line.startsWith('data:')) data += line.slice(5);
        }
        if (event === 'token') { started = true; body += data; render(true); }
        else if (event === 'cached') { badge = '<span class="badge cache">来自历史相似问题 · 语义缓存</span><br>'; render(true); }
        else if (event === 'ticket') { badge = '<span class="badge ticket">知识库无法解答 · 已转工单 Agent</span><br>'; render(true); }
        else if (event === 'source') {
          try {
            const arr = JSON.parse(data);
            srcHtml = '<div class="sources">' + arr.map(s =>
              `<span class="src-card">[片段${s.index}] ${escapeHtml(s.file)} #${s.seq}</span>`).join('') + '</div>';
            render(started);
          } catch (e) { /* ignore */ }
        }
        else if (event === 'error') { started = true; body += '\n⚠ ' + data; render(true); }
      }
    }
    if (!started && !srcHtml && !badge) body = '（无返回内容）';
    render(false);
  } catch (e) {
    body += (body ? '\n' : '') + '⚠ 连接中断或服务不可用，请稍后重试。';
    render(false);
  } finally {
    askBtn.disabled = false; askBtn.textContent = '发送';
  }
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
